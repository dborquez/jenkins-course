name: Docker Test Deploy

on:
  push:
    branches: [ "main" ] # Se dispara cada vez que subas algo a main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Copia el código hacia el servidor de GitHub
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Inicia sesión usando los Secrets que configuramos antes
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Construye la imagen y súbela (Push)
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Reemplaza 'tu-usuario' por tu nombre real de Docker Hub
          tags: ${{ secrets.DOCKER_USERNAME }}/docker-test:latest
